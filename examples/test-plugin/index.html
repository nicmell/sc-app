<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Test Plugin</title>
</head>
<body>

<!-- Demonstrates sc-test: the plugin author's synthdef just outputs audio to
     a bus via `Out.ar`. sc-test compiles its own recorder synthdef, allocates
     a private buffer, and spawns a RecordBuf synth that snoops the bus.
     No sc-buffer, no RecordBuf on the plugin side. -->

<sc-synthdef name="tone">
    <sc-control name="freq" value="440"/>
    <sc-control name="amp" value="0.3"/>
    <sc-control name="waveform" value="0"/>
    <sc-ugen name="sine" type="SinOsc">
        <sc-control name="freq" bind="freq"/>
    </sc-ugen>
    <sc-ugen name="saw" type="LFSaw">
        <sc-control name="freq" bind="freq"/>
    </sc-ugen>
    <!-- LFPulse is unipolar (0..1), so rescale to ±1 via `x * 2 - 1`. -->
    <sc-ugen name="pulse_raw" type="LFPulse">
        <sc-control name="freq" bind="freq"/>
        <sc-control name="width" value="0.5"/>
    </sc-ugen>
    <sc-ugen name="square" type="MulAdd">
        <sc-control name="in" bind="pulse_raw"/>
        <sc-control name="mul" value="2"/>
        <sc-control name="add" value="-1"/>
    </sc-ugen>
    <sc-ugen name="wave" type="Select">
        <sc-control name="which" bind="waveform"/>
        <sc-control name="channelsArray" bind="sine,saw,square"/>
    </sc-ugen>
    <sc-ugen name="vol" type="BinaryOpUGen" op="*">
        <sc-control name="a" bind="wave"/>
        <sc-control name="b" bind="amp"/>
    </sc-ugen>
    <sc-ugen name="out" type="Out">
        <sc-control name="bus" value="0"/>
        <sc-control name="channelsArray" bind="vol"/>
    </sc-ugen>
</sc-synthdef>

<sc-synth name="s1" bind="tone">
    <sc-control name="freq" value="440"/>
    <sc-control name="amp" value="0.3"/>
    <sc-control name="waveform" value="0"/>
</sc-synth>

<div style="display: flex; flex-direction: column; gap: 8px; padding: 4px; font-family: system-ui, sans-serif; font-size: 13px; color: var(--color-text, #e0e0e0);">
    <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
        <sc-run size="20"/>
        <sc-select bind="s1.waveform">
            <sc-option value="0" label="Sine"/>
            <sc-option value="1" label="Saw"/>
            <sc-option value="2" label="Square"/>
        </sc-select>
        <span>Freq:</span>
        <sc-range bind="s1.freq" min="100" max="2000" step="1" width="120" type="slider"/>
        <sc-display bind="s1.freq" format="%.0f Hz"/>
        <span>Amp:</span>
        <sc-range bind="s1.amp" min="0" max="1" step="0.01" width="80" type="slider"/>
    </div>
    <sc-test bus="0" width="300" height="120"/>
</div>

</body>
</html>
