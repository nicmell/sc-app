<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Studio</title>
</head>
<body>

<!-- SynthDefs -->

<sc-synthdef name="poly">
    <sc-control name="freq" value="440"/>
    <sc-control name="amp" value="0.15"/>
    <sc-control name="pan" value="0"/>
    <sc-control name="waveform" value="0"/>
    <sc-control name="cutoff" value="2000"/>
    <sc-control name="res" value="0.5"/>
    <sc-ugen name="sine" type="SinOsc">
        <sc-control name="freq" bind="freq"/>
    </sc-ugen>
    <sc-ugen name="saw" type="Saw">
        <sc-control name="freq" bind="freq"/>
    </sc-ugen>
    <sc-ugen name="square" type="Pulse">
        <sc-control name="freq" bind="freq"/>
        <sc-control name="width" value="0.5"/>
    </sc-ugen>
    <sc-ugen name="wave" type="Select">
        <sc-control name="which" bind="waveform"/>
        <sc-control name="channelsArray" bind="sine,saw,square"/>
    </sc-ugen>
    <sc-ugen name="filt" type="RLPF">
        <sc-control name="in" bind="wave"/>
        <sc-control name="freq" bind="cutoff"/>
        <sc-control name="rq" bind="res"/>
    </sc-ugen>
    <sc-ugen name="vol" type="BinaryOpUGen" op="*">
        <sc-control name="a" bind="filt"/>
        <sc-control name="b" bind="amp"/>
    </sc-ugen>
    <sc-ugen name="panned" type="Pan2">
        <sc-control name="in" bind="vol"/>
        <sc-control name="pos" bind="pan"/>
    </sc-ugen>
    <sc-ugen name="out" type="Out">
        <sc-control name="bus" value="0"/>
        <sc-control name="channelsArray" bind="panned"/>
    </sc-ugen>
</sc-synthdef>

<!-- Voices -->

<sc-group name="master">
    <sc-var name="waveform" value="0"/>
    <sc-var name="cutoff" value="2000"/>
    <sc-var name="res" value="0.5"/>

    <sc-group name="voices">
        <sc-synth name="v1" bind="poly">
            <sc-control name="freq" value="261"/>
            <sc-control name="amp" value="0.15"/>
            <sc-control name="pan" value="-0.5"/>
            <sc-control name="waveform" bind="master.waveform"/>
            <sc-control name="cutoff" bind="master.cutoff"/>
            <sc-control name="res" bind="master.res"/>
        </sc-synth>
        <sc-synth name="v2" bind="poly">
            <sc-control name="freq" value="329"/>
            <sc-control name="amp" value="0.15"/>
            <sc-control name="pan" value="0"/>
            <sc-control name="waveform" bind="master.waveform"/>
            <sc-control name="cutoff" bind="master.cutoff"/>
            <sc-control name="res" bind="master.res"/>
        </sc-synth>
        <sc-synth name="v3" bind="poly">
            <sc-control name="freq" value="392"/>
            <sc-control name="amp" value="0.15"/>
            <sc-control name="pan" value="0.5"/>
            <sc-control name="waveform" bind="master.waveform"/>
            <sc-control name="cutoff" bind="master.cutoff"/>
            <sc-control name="res" bind="master.res"/>
        </sc-synth>
    </sc-group>
</sc-group>

<!-- UI -->

<div style="font-family: system-ui, -apple-system, sans-serif; font-size: 12px; color: var(--color-text, #e0e0e0); display: flex; flex-direction: column; gap: 8px; padding: 4px;">

    <!-- Header -->
    <div style="display: flex; align-items: center; gap: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--color-border, #555);">
        <sc-run size="20"/>
        <span style="font-weight: 600; font-size: 13px;">Studio</span>
    </div>

    <!-- Oscillator -->
    <div style="display: flex; flex-direction: column; gap: 6px;">
        <span style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.5;">Oscillator</span>
        <sc-radio-group bind="master.waveform" orientation="horizontal">
            <sc-radio value="0" label="Sin" width="16" height="16"/>
            <sc-radio value="1" label="Saw" width="16" height="16"/>
            <sc-radio value="2" label="Sqr" width="16" height="16"/>
        </sc-radio-group>
    </div>

    <!-- Filter -->
    <div style="display: flex; flex-direction: column; gap: 6px;">
        <span style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.5;">Filter</span>
        <div style="display: flex; gap: 16px;">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
                <span style="font-size: 10px; opacity: 0.6;">Cutoff</span>
                <sc-range type="knob" bind="master.cutoff" min="100" max="8000" step="10" diameter="40"/>
                <span style="font-size: 10px; opacity: 0.8;"><sc-display bind="master.cutoff" format="%d Hz"/></span>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
                <span style="font-size: 10px; opacity: 0.6;">Res</span>
                <sc-range type="knob" bind="master.res" min="0.1" max="1" step="0.01" diameter="40"/>
                <span style="font-size: 10px; opacity: 0.8;"><sc-display bind="master.res" format="%.2f"/></span>
            </div>
        </div>
    </div>

    <!-- Voices -->
    <div style="display: flex; flex-direction: column; gap: 6px;">
        <span style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.5;">Voices</span>

        <div style="display: flex; align-items: center; gap: 12px; padding: 4px 6px; border: 1px solid var(--color-border, #444); border-radius: 4px; background: var(--color-surface, rgba(255,255,255,0.03));">
            <div style="display: flex; align-items: center; gap: 4px; min-width: 40px;">
                <sc-run bind="master.voices.v1" size="16"/>
                <span style="font-weight: 600; font-size: 11px;">V1</span>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
                <span style="font-size: 10px; opacity: 0.6;">Freq</span>
                <sc-select bind="master.voices.v1.freq">
                    <sc-option value="131" label="C3"/>
                    <sc-option value="165" label="E3"/>
                    <sc-option value="196" label="G3"/>
                    <sc-option value="261" label="C4"/>
                    <sc-option value="329" label="E4"/>
                    <sc-option value="392" label="G4"/>
                </sc-select>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
                <span style="font-size: 10px; opacity: 0.6;">Amp</span>
                <sc-range type="slider" bind="master.voices.v1.amp" min="0" max="0.5" step="0.01" width="80" height="12"/>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
                <span style="font-size: 10px; opacity: 0.6;">Pan</span>
                <sc-range type="slider" bind="master.voices.v1.pan" min="-1" max="1" step="0.01" width="80" height="12"/>
            </div>
        </div>

        <div style="display: flex; align-items: center; gap: 12px; padding: 4px 6px; border: 1px solid var(--color-border, #444); border-radius: 4px; background: var(--color-surface, rgba(255,255,255,0.03));">
            <div style="display: flex; align-items: center; gap: 4px; min-width: 40px;">
                <sc-run bind="master.voices.v2" size="16"/>
                <span style="font-weight: 600; font-size: 11px;">V2</span>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
                <span style="font-size: 10px; opacity: 0.6;">Freq</span>
                <sc-select bind="master.voices.v2.freq">
                    <sc-option value="131" label="C3"/>
                    <sc-option value="165" label="E3"/>
                    <sc-option value="196" label="G3"/>
                    <sc-option value="261" label="C4"/>
                    <sc-option value="329" label="E4"/>
                    <sc-option value="392" label="G4"/>
                </sc-select>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
                <span style="font-size: 10px; opacity: 0.6;">Amp</span>
                <sc-range type="slider" bind="master.voices.v2.amp" min="0" max="0.5" step="0.01" width="80" height="12"/>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
                <span style="font-size: 10px; opacity: 0.6;">Pan</span>
                <sc-range type="slider" bind="master.voices.v2.pan" min="-1" max="1" step="0.01" width="80" height="12"/>
            </div>
        </div>

        <div style="display: flex; align-items: center; gap: 12px; padding: 4px 6px; border: 1px solid var(--color-border, #444); border-radius: 4px; background: var(--color-surface, rgba(255,255,255,0.03));">
            <div style="display: flex; align-items: center; gap: 4px; min-width: 40px;">
                <sc-run bind="master.voices.v3" size="16"/>
                <span style="font-weight: 600; font-size: 11px;">V3</span>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
                <span style="font-size: 10px; opacity: 0.6;">Freq</span>
                <sc-select bind="master.voices.v3.freq">
                    <sc-option value="131" label="C3"/>
                    <sc-option value="165" label="E3"/>
                    <sc-option value="196" label="G3"/>
                    <sc-option value="261" label="C4"/>
                    <sc-option value="329" label="E4"/>
                    <sc-option value="392" label="G4"/>
                </sc-select>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
                <span style="font-size: 10px; opacity: 0.6;">Amp</span>
                <sc-range type="slider" bind="master.voices.v3.amp" min="0" max="0.5" step="0.01" width="80" height="12"/>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
                <span style="font-size: 10px; opacity: 0.6;">Pan</span>
                <sc-range type="slider" bind="master.voices.v3.pan" min="-1" max="1" step="0.01" width="80" height="12"/>
            </div>
        </div>
    </div>

    <!-- Monitor -->
    <div style="display: flex; flex-direction: column; gap: 6px;">
        <span style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.5;">Monitor</span>
        <div style="display: flex; gap: 12px;">
            <div style="display: flex; gap: 4px; align-items: baseline;">
                <span style="font-size: 10px; opacity: 0.5;">Wave</span>
                <span style="font-size: 11px;">
                    <sc-if bind="master.waveform" is-equal="0" is-truthy="Sine" is-falsy=""/>
                    <sc-if bind="master.waveform" is-equal="1" is-truthy="Saw" is-falsy=""/>
                    <sc-if bind="master.waveform" is-equal="2" is-truthy="Square" is-falsy=""/>
                </span>
            </div>
            <div style="display: flex; gap: 4px; align-items: baseline;">
                <span style="font-size: 10px; opacity: 0.5;">Cutoff</span>
                <span style="font-size: 11px;"><sc-display bind="master.cutoff" format="%d Hz"/></span>
            </div>
            <div style="display: flex; gap: 4px; align-items: baseline;">
                <span style="font-size: 10px; opacity: 0.5;">Res</span>
                <span style="font-size: 11px;"><sc-display bind="master.res" format="%.2f"/></span>
            </div>
        </div>
    </div>

</div>

</body>
</html>
