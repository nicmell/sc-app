<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Group Bind Plugin</title>
</head>
<body>
<sc-synthdef name="tone" freq="440" amp="0.2" gate="1">
    <sc-ugen name="osc" type="SinOsc" freq="freq"/>
    <sc-ugen name="env" type="Linen" gate="gate" attacktime="0.01" susLevel="1" releasetime="0.1"/>
    <sc-ugen name="sig" type="BinaryOpUGen" op="*" a="osc" b="amp"/>
    <sc-ugen name="gated" type="BinaryOpUGen" op="*" a="sig" b="env"/>
    <sc-ugen name="out" type="Out" bus="0" channelsarray="gated"/>
</sc-synthdef>

<sc-group name="voices">
    <sc-synth name="low" bind="tone" freq="261" amp="0.15" gate="1"/>
    <sc-synth name="high" bind="tone" freq="523" amp="0.15" gate="1"/>

    <div>
        <h3>Group Controls</h3>
        <label>
            <span>Group Run</span>
            <sc-run bind="voices" size="24"/>
        </label>
        <label>
            <sc-range type="slider" bind="voices.amp" min="0" max="1" step="0.01" width="120" height="16"/>
        </label>
    </div>

    <div>
        <h3>Low Voice</h3>
        <label>
            <sc-run bind="low" size="20"/>
        </label>
        <label>
            <span>Freq: <sc-display bind="low.freq" format="%d Hz"/></span>
            <sc-range type="knob" bind="low.freq" min="20" max="1000" step="1" diameter="48"/>
        </label>
        <label>
            <span>Amp: <sc-display bind="low.amp" format="%.2f"/></span>
            <sc-range type="knob" bind="low.amp" min="0" max="1" step="0.01" diameter="48"/>
        </label>
    </div>

    <div>
        <h3>High Voice</h3>
        <label>
            <sc-run bind="high" size="20"/>
        </label>
        <label>
            <span>Freq: <sc-display bind="high.freq" format="%d Hz"/></span>
            <sc-range type="knob" bind="high.freq" min="20" max="2000" step="1" diameter="48"/>
        </label>
        <label>
            <span>Amp: <sc-display bind="high.amp" format="%.2f"/></span>
            <sc-range type="knob" bind="high.amp" min="0" max="1" step="0.01" diameter="48"/>
        </label>
    </div>
</sc-group>
</body>
</html>
