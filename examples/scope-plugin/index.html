<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Scope Plugin</title>
</head>
<body>

<!-- Cyclic streaming buffer. RecordBuf writes into it; sc-waveform polls it
     via /b_getn and appends each tick to an in-memory Float32Array. No file
     is written, no download is offered — samples live only in the frontend
     until the component disconnects. Size bounds phase-offset lag:
     2048 / 48000 ≈ 43 ms. -->
<sc-buffer name="viz" frames="2048" channels="1"/>

<sc-synthdef name="tone">
    <sc-control name="bufnum" value="0"/>
    <sc-control name="freq" value="440"/>
    <sc-control name="amp" value="0.3"/>
    <sc-ugen name="mod" type="LFNoise1" rate="kr">
        <sc-control name="freq" value="4"/>
    </sc-ugen>
    <sc-ugen name="spread" type="BinaryOpUGen" op="*">
        <sc-control name="a" bind="mod"/>
        <sc-control name="b" value="60"/>
    </sc-ugen>
    <sc-ugen name="live" type="BinaryOpUGen" op="+">
        <sc-control name="a" bind="freq"/>
        <sc-control name="b" bind="spread"/>
    </sc-ugen>
    <sc-ugen name="osc" type="SinOsc">
        <sc-control name="freq" bind="live"/>
    </sc-ugen>
    <sc-ugen name="sig" type="BinaryOpUGen" op="*">
        <sc-control name="a" bind="osc"/>
        <sc-control name="b" bind="amp"/>
    </sc-ugen>
    <sc-ugen name="rec" type="RecordBuf">
        <sc-control name="inputArray" bind="sig"/>
        <sc-control name="bufnum" bind="bufnum"/>
        <sc-control name="loop" value="1"/>
    </sc-ugen>
    <sc-ugen name="out" type="Out">
        <sc-control name="bus" value="0"/>
        <sc-control name="channelsArray" bind="sig"/>
    </sc-ugen>
</sc-synthdef>

<sc-synth name="voice" bind="tone">
    <sc-control name="bufnum" bind="viz"/>
    <sc-control name="freq" value="440"/>
    <sc-control name="amp" value="0.3"/>
</sc-synth>

<div style="display: flex; flex-direction: column; gap: 8px; padding: 8px; font-family: system-ui, sans-serif; font-size: 12px; color: var(--color-text, #e0e0e0);">

    <div style="display: flex; align-items: center; gap: 8px;">
        <sc-run size="24"/>
        <span style="font-weight: 600;">In-memory scope</span>
    </div>

    <div style="display: flex; gap: 16px; align-items: flex-end;">
        <label style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
            <span style="opacity: 0.6;">Freq</span>
            <sc-range type="knob" bind="voice.freq" min="80" max="1200" step="1" diameter="40"/>
            <span style="opacity: 0.8;"><sc-display bind="voice.freq" format="%d Hz"/></span>
        </label>
        <label style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
            <span style="opacity: 0.6;">Amp</span>
            <sc-range type="knob" bind="voice.amp" min="0" max="0.5" step="0.01" diameter="40"/>
            <span style="opacity: 0.8;"><sc-display bind="voice.amp" format="%.2f"/></span>
        </label>
    </div>

    <sc-waveform bind="viz" window="2" width="360" height="120"/>

</div>

</body>
</html>
