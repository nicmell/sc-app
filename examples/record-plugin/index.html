<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Record Plugin</title>
</head>
<body>

<!-- DiskOut streaming buffer: 65536 frames, mono. This is NOT the recording length
     — sc-record streams this buffer's contents straight to a temp file on disk
     every block. Recording length is disk-limited. -->
<sc-buffer name="rec" frames="65536" channels="1"/>

<sc-synthdef name="chirp">
    <sc-control name="bufnum" value="0"/>
    <sc-control name="center" value="440"/>
    <sc-control name="sweep" value="300"/>
    <sc-control name="amp" value="0.3"/>
    <sc-ugen name="mod" type="LFNoise1" rate="kr">
        <sc-control name="freq" value="2"/>
    </sc-ugen>
    <sc-ugen name="scaled" type="BinaryOpUGen" op="*">
        <sc-control name="a" bind="mod"/>
        <sc-control name="b" bind="sweep"/>
    </sc-ugen>
    <sc-ugen name="freq" type="BinaryOpUGen" op="+">
        <sc-control name="a" bind="scaled"/>
        <sc-control name="b" bind="center"/>
    </sc-ugen>
    <sc-ugen name="osc" type="SinOsc">
        <sc-control name="freq" bind="freq"/>
    </sc-ugen>
    <sc-ugen name="sig" type="BinaryOpUGen" op="*">
        <sc-control name="a" bind="osc"/>
        <sc-control name="b" bind="amp"/>
    </sc-ugen>
    <sc-ugen name="disk" type="DiskOut">
        <sc-control name="bufnum" bind="bufnum"/>
        <sc-control name="channelsArray" bind="sig"/>
    </sc-ugen>
    <sc-ugen name="out" type="Out">
        <sc-control name="bus" value="0"/>
        <sc-control name="channelsArray" bind="sig"/>
    </sc-ugen>
</sc-synthdef>

<sc-synth name="voice" bind="chirp">
    <sc-control name="bufnum" bind="rec"/>
    <sc-control name="center" value="440"/>
    <sc-control name="sweep" value="300"/>
    <sc-control name="amp" value="0.3"/>
</sc-synth>

<div style="display: flex; flex-direction: column; gap: 8px; padding: 8px; font-family: system-ui, sans-serif; font-size: 12px; color: var(--color-text, #e0e0e0);">

    <div style="display: flex; align-items: center; gap: 8px;">
        <sc-run size="24"/>
        <span style="font-weight: 600;">Record demo</span>
    </div>

    <div style="display: flex; gap: 16px; align-items: flex-end;">
        <label style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
            <span style="opacity: 0.6;">Center</span>
            <sc-range type="knob" bind="voice.center" min="80" max="1200" step="1" diameter="40"/>
            <span style="opacity: 0.8;"><sc-display bind="voice.center" format="%d Hz"/></span>
        </label>
        <label style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
            <span style="opacity: 0.6;">Sweep</span>
            <sc-range type="knob" bind="voice.sweep" min="0" max="800" step="1" diameter="40"/>
            <span style="opacity: 0.8;"><sc-display bind="voice.sweep" format="%d Hz"/></span>
        </label>
        <label style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
            <span style="opacity: 0.6;">Amp</span>
            <sc-range type="knob" bind="voice.amp" min="0" max="0.5" step="0.01" diameter="40"/>
            <span style="opacity: 0.8;"><sc-display bind="voice.amp" format="%.2f"/></span>
        </label>
    </div>

    <sc-record bind="rec" window="30" width="360" height="120"/>

</div>

</body>
</html>
