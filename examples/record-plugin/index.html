<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Record Plugin</title>
</head>
<body>

<sc-buffer name="rec" frames="88200" channels="1"/>

<sc-synthdef name="tone">
    <sc-control name="freq" value="440"/>
    <sc-control name="amp" value="0.3"/>
    <sc-control name="bufnum" value="0"/>
    <sc-ugen name="sig" type="SinOsc">
        <sc-control name="freq" bind="freq"/>
    </sc-ugen>
    <sc-ugen name="vol" type="BinaryOpUGen" op="*">
        <sc-control name="a" bind="sig"/>
        <sc-control name="b" bind="amp"/>
    </sc-ugen>
    <sc-ugen name="out" type="Out">
        <sc-control name="bus" value="0"/>
        <sc-control name="channelsArray" bind="vol"/>
    </sc-ugen>
    <sc-ugen name="write" type="RecordBuf">
        <sc-control name="inputArray" bind="vol"/>
        <sc-control name="bufnum" bind="bufnum"/>
    </sc-ugen>
</sc-synthdef>

<sc-synth name="s1" bind="tone">
    <sc-control name="freq" value="440"/>
    <sc-control name="amp" value="0.3"/>
    <sc-control name="bufnum" bind="rec"/>
</sc-synth>

<div style="display: flex; align-items: center; gap: 12px; padding: 4px; font-family: system-ui, sans-serif; font-size: 13px; color: var(--color-text, #e0e0e0);">
    <sc-run size="20"/>
    <sc-range bind="s1.freq" min="100" max="2000" step="1" width="120" type="slider"/>
    <sc-display bind="s1.freq" format="%.0f Hz"/>
    <sc-range bind="s1.amp" min="0" max="1" step="0.01" width="80" type="slider"/>
    <sc-record bind="rec" label="Record 2s"/>
</div>

</body>
</html>
