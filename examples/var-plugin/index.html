<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Var Plugin</title>
</head>
<body>
<sc-group name="vars">
    <sc-var name="knobValue" value="0.5"/>
    <sc-var name="sliderValue" value="0"/>
    <sc-var name="mirror" bind="vars.knobValue"/>
    <sc-var name="doubled" bind="vars.knobValue * 2"/>
    <sc-var name="offset" bind="(vars.sliderValue + 1) * 50"/>
</sc-group>
<div class="controls">
    <label>
        <sc-range type="knob" bind="vars.knobValue" min="0" max="1" step="0.01" diameter="48"/>
        <span>Knob: <sc-display bind="vars.knobValue" format="%.2f"/></span>
    </label>
    <label>
        <sc-range type="slider" bind="vars.sliderValue" min="-1" max="1" step="0.01" width="120" height="16"/>
        <span>Slider: <sc-display bind="vars.sliderValue" format="%.2f"/></span>
    </label>
    <label>
        <span>Mirror: <sc-display bind="vars.mirror" format="%.2f"/></span>
    </label>
    <label>
        <span>Doubled: <sc-display bind="vars.doubled" format="%.2f"/></span>
    </label>
    <label>
        <span>Offset: <sc-display bind="vars.offset" format="%.1f"/></span>
    </label>
</div>
</body>
</html>
